  <section id="home" class="section visible">
    <div class="hero">
      <img src="ai-minimalist-profile.jpg" alt="Tech minimalist vector, coffee shop" class="hero-img">
      <h1 class="gradient-name">

  <!-- Other sections below (About, Skills, Projects, Blog, Contact) remain as in your existing code -->

  <footer>
    <p>Thank you for visiting. Let's collaborate and build something amazing.</p>
    <p>&copy; 2025 Siri Raju Darsinala</p>
  </footer>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('visible'));
      document.getElementById(id).classList.add('visible');
    }

    function showMessage(e) {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.innerText = 'Message sent! If any error, please check internet or try again.';
    }

    // Moving glowing network background (animated drift)
    const netCanvas = document.getElementById('networkCanvas');
    const netCtx = netCanvas.getContext('2d');
    let networkImg = new Image();
    networkImg.src = 'download.jpg'; // place your blue neural network image as "download.jpg"

    function resizeNetwork() {
      netCanvas.width = window.innerWidth;
      netCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeNetwork);
    resizeNetwork();

    let offset = 0;
    function animateNetworkBg() {
      offset += 0.04;
      netCtx.clearRect(0, 0, netCanvas.width, netCanvas.height);
      let sw = Math.max(netCanvas.width, 1080), sh = Math.max(netCanvas.height, 608);
      let dx = Math.sin(offset/2) * 24;
      let dy = Math.cos(offset/3) * 24;
      netCtx.globalAlpha = 0.77;
      netCtx.drawImage(networkImg, dx, dy, sw, sh, 0, 0, netCanvas.width, netCanvas.height);
      netCtx.globalAlpha = 1.0;
      requestAnimationFrame(animateNetworkBg);
    }
    networkImg.onload = animateNetworkBg;

    // Animated gold sparkling lines (canvas overlay)
    const sparkleCanvas = document.getElementById('sparkleCanvas');
    const sparkleCtx = sparkleCanvas.getContext('2d');
    function resizeSparkle() {
      sparkleCanvas.width = window.innerWidth;
      sparkleCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeSparkle);
    resizeSparkle();

    const sparkleLines = Array.from({length: 18}, (_,i)=>({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      dx: (Math.random()-0.5)*0.3,
      dy: (Math.random()-0.5)*0.3,
      angle: Math.random()*Math.PI*2,
      length: 80+Math.random()*90,
      speed: 0.001+Math.random()*0.002,
      alpha: 0.10+Math.random()*0.22
    }));

    function animateSparkleLines() {
      sparkleCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
      sparkleLines.forEach(line => {
        line.x += Math.cos(line.angle)*0.26 + line.dx;
        line.y += Math.sin(line.angle)*0.26 + line.dy;
        line.angle += (Math.random()-0.5)*0.005;

        if(line.x < 0 || line.x > sparkleCanvas.width) line.x = Math.random()*sparkleCanvas.width;
        if(line.y < 0 || line.y > sparkleCanvas.height) line.y = Math.random()*sparkleCanvas.height;

        const x2 = line.x + Math.cos(line.angle)*line.length;
        const y2 = line.y + Math.sin(line.angle)*line.length;

        sparkleCtx.save();
        sparkleCtx.beginPath();
        sparkleCtx.moveTo(line.x, line.y);
        sparkleCtx.lineTo(x2, y2);
        const grad = sparkleCtx.createLinearGradient(line.x, line.y, x2, y2);
        grad.addColorStop(0, "#fff2cc");
        grad.addColorStop(0.45, "#FFD700");
        grad.addColorStop(1, "#fffbe7");
        sparkleCtx.strokeStyle = grad;
        sparkleCtx.globalAlpha = line.alpha;
        sparkleCtx.lineWidth = 2.2 + Math.random();
        sparkleCtx.shadowBlur = 10;
        sparkleCtx.shadowColor = "#FFD700";
        sparkleCtx.stroke();
        sparkleCtx.restore();
      });
      requestAnimationFrame(animateSparkleLines);
    }
    animateSparkleLines();
  </script>
</body>
</html>
